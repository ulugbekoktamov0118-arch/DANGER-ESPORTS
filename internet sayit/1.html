<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DANGER ESPORTS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    background: radial-gradient(circle at center,#0f0f1a,#000);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Orbitron', sans-serif;
    overflow:hidden;
    color:white;
}
body{
    margin:0;
    padding:0;
    min-height:100vh;

    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("fon.jpg") center/cover no-repeat;

    font-family:Arial, sans-serif;
    color:white;
    text-align:center;
}
/* Container */
.hero{
    text-align:center;
}

/* LOGO */
.logo{
    width:120px;
    margin-bottom:25px;
}

/* Main Text */
.main-text{
    font-size:85px;
    font-weight:900;
    letter-spacing:6px;
    color:#00ffff;
    cursor:pointer;
    transition:0.4s ease;
}
.main-text:hover{
    transform: scale(1.05); /* faqat biroz kattalashish */
}
/* Powered By */
.powered{
    font-size:22px;
    margin-top:15px;
    letter-spacing:4px;
    color:#00ff88;
}

/* Button */
.enter-btn{
    margin-top:40px;
    padding:15px 45px;
    border:2px solid #00ffff;
    background:transparent;
    color:#00ffff;
    font-size:20px;
    letter-spacing:3px;
    cursor:pointer;
    transition:0.3s;
}

.enter-btn:hover{
    background:#00ffff;
    color:black;
    box-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff;
}
</style>
</head>
<body>

<div class="hero">

    <!-- LOGO joyi -->
    <img src="bgm.png" class="logo" alt="Logo">

    <!-- Asosiy yozuv -->
    <div class="main-text">DANGER ESPORTS</div>

    <!-- Powered by -->
    <div class="powered">POWERED BY SENATOR</div>

    <!-- Tugma -->
    <button class="enter-btn">ENTER</button>

</div>

<script>
document.querySelector('.enter-btn').addEventListener('click', function() {
    window.location.href = '2.html'; // bu yerga TEAM ROSTER sahifasi fayl nomi
});
</script>

</body>
</html>
